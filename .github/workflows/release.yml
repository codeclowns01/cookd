name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: install
        run: npm ci

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build

      - name: publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  compile-binaries:
    name: compile / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: publish-npm
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            bun-target: bun-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            bun-target: bun-linux-arm64
          - target: darwin-x64
            os: macos-latest
            bun-target: bun-darwin-x64
          - target: darwin-arm64
            os: macos-latest
            bun-target: bun-darwin-arm64
          - target: windows-x64
            os: windows-latest
            bun-target: bun-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: setup node (for npm ci)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: install
        run: npm ci

      - name: build
        run: npm run build

      - name: compile binary
        run: bun build ./dist/cli.js --compile --target=${{ matrix.bun-target }} --outfile=cookd-${{ matrix.target }}

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cookd-${{ matrix.target }}
          path: cookd-${{ matrix.target }}*

  create-release:
    name: create github release
    runs-on: ubuntu-latest
    needs: compile-binaries
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
